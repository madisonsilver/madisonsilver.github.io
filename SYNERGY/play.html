<html>
<head>
<script>
class Character {
	constructor(title, group, identifier) {
		this.title = title;
		this.group = group;
		this.identifier = identifier;
	}
}

function shuffle(array) {
    var currentIndex = array.length, temporaryValue, randomIndex;

    // While there remain elements to shuffle...
    while (0 !== currentIndex) {

        // Pick a remaining element...
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex -= 1;

        // And swap it with the current element.
        temporaryValue = array[currentIndex];
        array[currentIndex] = array[randomIndex];
        array[randomIndex] = temporaryValue;
    }

    return array;
}

class Deck {
    constructor(cards = []) {
        this.cards = cards;
    }

    shuffle() {
        this.cards = shuffle(this.cards);
    }

    reveal(index = 0) {
        return this.cards[index];
    }

    remove(index = 0) {
        a = this.reveal(index);
        this.cards.splice(index, 1);
        return a;
    }

}

var log = "";
var characters = [new Character("1/1","1","11"), new Character("1/2","1","12"), new Character("2/1","2","21"), new Character("2/2","2","22")];
var team1 = [];
var team2 = [];


function setup(){
	team1 = [];
	team2 = [];
	log = "";
	console.log("setup run");
	setupTeam1();
}
function setupTeam1(){
	var fieldContents = "Choose player 1's team";
	var temp = [];
	for (var i = 0; i < characters.length; i++){
		fieldContents += '<button>'+characters[i].name+'</button>'
	}
	document.getElementById("playField").write(fieldContents);
}
</script>
</head>
<body>
<div id="playField" onload="setup();"></div>
<div id="playLog"></div>
</body>
</html>
