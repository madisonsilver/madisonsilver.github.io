<head><body>
<script>
Array.prototype.random = function () {
  return this[Math.floor((Math.random()*this.length))];
};

function generate(){
  var item = "";
  var group = ["w","s","m"].random();
  return group;
};

function update(){
    document.getElementById("item").innerHTML = generate();
};
</script>
  
<p id="item" onload = "update()"></p>
<button onclick = "update()">Generate new item</button>
</body></head>
